<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0F766E">
    <title>WanderLog offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #f8fafc;
        color: #134e4a;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 32rem;
      }

      h1 {
        font-size: 1.75rem;
        line-height: 1.2;
        margin: 0 0 12px;
      }

      p {
        color: #475569;
        font-size: 1rem;
        line-height: 1.6;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>WanderLog is offline</h1>
      <p>The app shell is available, but routes, maps, diary changes, and AI features need a network connection. Reconnect and refresh to continue.</p>
    </main>
  </body>
</html>
